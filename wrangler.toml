name = "ipme-wtf"
main = "src/worker.js"
compatibility_date = "2025-05-01"
workers_dev = true

# Static assets (logo, css, js, favicon) ride along on the same origin.
# No index.html in ./public, so "/" falls through to the Worker.
[assets]
directory = "./public"
binding = "ASSETS"

# account_id is read from the CLOUDFLARE_ACCOUNT_ID env var at deploy time,
# or pass --account-id. Uncomment to pin it:
# account_id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

# ── Custom domains ───────────────────────────────────────────────────────────
# Bind these once the ipme.wtf zone is active on Cloudflare. The three hostnames
# back the dual-stack lookup:
#   ipme.wtf      → A + AAAA  (main page, arrives on whatever stack the client has)
#   v4.ipme.wtf   → A only    (forces IPv4 so app.js can read the v4 address)
#   v6.ipme.wtf   → AAAA only (forces IPv6 so app.js can read the v6 address)
# routes = [
#   { pattern = "ipme.wtf",    custom_domain = true },
#   { pattern = "v4.ipme.wtf", custom_domain = true },
#   { pattern = "v6.ipme.wtf", custom_domain = true },
# ]
