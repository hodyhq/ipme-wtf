name = "ipme-wtf"
main = "src/worker.js"
compatibility_date = "2025-05-01"
workers_dev = true

# ── Custom domain ────────────────────────────────────────────────────────────
# Serves the page + always sees the visitor's connected IP. (The dual-stack
# v4./v6. subdomains were dropped: a Cloudflare-proxied host answers on both
# stacks, so they can't force a single family — see the project's Obsidian doc.)
# NOTE: top-level keys like `routes` MUST come before any [table] header in TOML,
# or they get parsed as part of that table.
routes = [
  { pattern = "ipme.wtf", custom_domain = true },
]

# Static assets (logo, css, js, favicon) ride along on the same origin.
# No index.html in ./public, so "/" falls through to the Worker.
[assets]
directory = "./public"
binding = "ASSETS"
